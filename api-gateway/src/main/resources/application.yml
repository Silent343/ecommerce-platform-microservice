server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          # No exponer automáticamente todos los servicios: definimos rutas explícitas
          enabled: false
      routes:
        # ---- users-service ----
        - id: users-auth
          uri: lb://USERS-SERVICE
          predicates:
            - Path=/api/auth/**
        - id: users
          uri: lb://USERS-SERVICE
          predicates:
            - Path=/api/users/**

        # ---- products-service ----
        - id: products
          uri: lb://PRODUCTS-SERVICE
          predicates:
            - Path=/api/products/**
        - id: categories
          uri: lb://PRODUCTS-SERVICE
          predicates:
            - Path=/api/categories/**

        # ---- orders-service ----
        - id: cart
          uri: lb://ORDERS-SERVICE
          predicates:
            - Path=/api/cart/**
        - id: orders
          uri: lb://ORDERS-SERVICE
          predicates:
            - Path=/api/orders/**

        # ---- payment-service ----
        - id: payments
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/api/payments/**

      # CORS global para el frontend Angular
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

security:
  jwt:
    # MISMO secreto que firma los tokens en users-service
    secret: ${JWT_SECRET:cambiar-esta-clave-secreta-de-al-menos-256-bits-en-produccion}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
