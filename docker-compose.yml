name: ecommerce-platform

services:
  # ---------- Infraestructura ----------
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ecommerce-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI -> http://localhost:15672
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-net

  eureka-server:
    build: ./eureka-server
    container_name: ecommerce-eureka
    ports:
      - "8761:8761"     # Eureka dashboard -> http://localhost:8761
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ecommerce-net

  # ---------- Microservicios ----------
  users-service:
    build: ./users-service
    container_name: ecommerce-users
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: users_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      JPA_DDL_AUTO: update
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      JWT_SECRET: cambiar-esta-clave-secreta-de-al-menos-256-bits-en-produccion
      EUREKA_URL: http://eureka-server:8761/eureka
    ports:
      - "8081:8081"
    networks:
      - ecommerce-net

  products-service:
    build: ./products-service
    container_name: ecommerce-products
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: products_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      JPA_DDL_AUTO: update
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      JWT_SECRET: cambiar-esta-clave-secreta-de-al-menos-256-bits-en-produccion
      EUREKA_URL: http://eureka-server:8761/eureka
    ports:
      - "8082:8082"
    networks:
      - ecommerce-net

  orders-service:
    build: ./orders-service
    container_name: ecommerce-orders
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: orders_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      JPA_DDL_AUTO: update
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      JWT_SECRET: cambiar-esta-clave-secreta-de-al-menos-256-bits-en-produccion
      EUREKA_URL: http://eureka-server:8761/eureka
    ports:
      - "8083:8083"
    networks:
      - ecommerce-net

  payment-service:
    build: ./payment-service
    container_name: ecommerce-payment
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: payments_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      JPA_DDL_AUTO: update
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      JWT_SECRET: cambiar-esta-clave-secreta-de-al-menos-256-bits-en-produccion
      EUREKA_URL: http://eureka-server:8761/eureka
    ports:
      - "8084:8084"
    networks:
      - ecommerce-net

  notification-service:
    build: ./notification-service
    container_name: ecommerce-notification
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: notif_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      JPA_DDL_AUTO: update
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      JWT_SECRET: cambiar-esta-clave-secreta-de-al-menos-256-bits-en-produccion
      EUREKA_URL: http://eureka-server:8761/eureka
    ports:
      - "8085:8085"
    networks:
      - ecommerce-net

  api-gateway:
    build: ./api-gateway
    container_name: ecommerce-gateway
    depends_on:
      eureka-server:
        condition: service_started
      users-service:
        condition: service_started
      products-service:
        condition: service_started
      orders-service:
        condition: service_started
    environment:
      JWT_SECRET: cambiar-esta-clave-secreta-de-al-menos-256-bits-en-produccion
      EUREKA_URL: http://eureka-server:8761/eureka
    ports:
      - "8080:8080"
    networks:
      - ecommerce-net

volumes:
  postgres_data:

networks:
  ecommerce-net:
    driver: bridge
